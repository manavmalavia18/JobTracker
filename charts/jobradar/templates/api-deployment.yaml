apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobradar-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: jobradar-api
  template:
    metadata:
      labels:
        app: jobradar-api
    spec:
      containers:
        - name: jobradar-api
          image: {{ .Values.api.image }}
          imagePullPolicy: {{ .Values.api.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "{{ .Values.redis.port }}"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi